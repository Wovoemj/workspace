version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: travel-assistant-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: travel_assistant
      MYSQL_USER: travel_user
      MYSQL_PASSWORD: travel_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema:/docker-entrypoint-initdb.d
      - ./database/seeds:/docker-entrypoint-seeds.d
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - travel-network

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: travel-assistant-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - travel-network

  # Elasticsearch搜索引擎
  elasticsearch:
    image: elasticsearch:8.8.0
    container_name: travel-assistant-elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - travel-network

  # Milvus向量数据库
  milvus:
    image: milvusdb/milvus:v2.3.0
    container_name: travel-assistant-milvus
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
    ports:
      - "19530:19530"
    volumes:
      - milvus_data:/var/lib/milvus
    networks:
      - travel-network
    depends_on:
      - etcd
      - minio

  # Etcd (Milvus依赖)
  etcd:
    image: quay.io/coreos/etcd:v3.5.0
    container_name: travel-assistant-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
    volumes:
      - etcd_data:/etcd
    networks:
      - travel-network

  # MinIO (Milvus依赖)
  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: travel-assistant-minio
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - travel-network

  # API网关
  gateway:
    build:
      context: ./backend/gateway
      dockerfile: Dockerfile
    container_name: travel-assistant-gateway
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=travel_assistant
      - DB_USER=travel_user
      - DB_PASSWORD=travel_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - mysql
      - redis
    networks:
      - travel-network

  # 用户服务
  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    container_name: travel-assistant-user-service
    ports:
      - "8081:8081"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=travel_assistant
      - DB_USER=travel_user
      - DB_PASSWORD=travel_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=your-jwt-secret-key
    depends_on:
      - mysql
      - redis
    networks:
      - travel-network

  # 产品服务
  product-service:
    build:
      context: ./backend/product-service
      dockerfile: Dockerfile
    container_name: travel-assistant-product-service
    ports:
      - "8082:8082"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=travel_assistant
      - DB_USER=travel_user
      - DB_PASSWORD=travel_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTICSEARCH_PORT=9200
    depends_on:
      - mysql
      - redis
      - elasticsearch
    networks:
      - travel-network

  # 订单服务
  order-service:
    build:
      context: ./backend/order-service
      dockerfile: Dockerfile
    container_name: travel-assistant-order-service
    ports:
      - "8083:8083"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=travel_assistant
      - DB_USER=travel_user
      - DB_PASSWORD=travel_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - mysql
      - redis
    networks:
      - travel-network

  # AI服务
  ai-service:
    build:
      context: ./backend/ai-service
      dockerfile: Dockerfile
    container_name: travel-assistant-ai-service
    ports:
      - "8084:8084"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=travel_assistant
      - DB_USER=travel_user
      - DB_PASSWORD=travel_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - OPENAI_API_KEY=your-openai-api-key
    depends_on:
      - mysql
      - redis
      - milvus
    networks:
      - travel-network

  # 推荐服务
  recommend-service:
    build:
      context: ./backend/recommend-service
      dockerfile: Dockerfile
    container_name: travel-assistant-recommend-service
    ports:
      - "8085:8085"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=travel_assistant
      - DB_USER=travel_user
      - DB_PASSWORD=travel_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
    depends_on:
      - mysql
      - redis
      - milvus
    networks:
      - travel-network

  # 通知服务
  notification-service:
    build:
      context: ./backend/notification-service
      dockerfile: Dockerfile
    container_name: travel-assistant-notification-service
    ports:
      - "8086:8086"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=travel_assistant
      - DB_USER=travel_user
      - DB_PASSWORD=travel_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - mysql
      - redis
    networks:
      - travel-network

  # 前端用户端
  user-web:
    build:
      context: ./frontend/user-web
      dockerfile: Dockerfile
    container_name: travel-assistant-user-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXT_PUBLIC_AI_SERVICE_URL=http://localhost:8084
    depends_on:
      - gateway
    networks:
      - travel-network

  # 前端管理端
  admin-web:
    build:
      context: ./frontend/admin-web
      dockerfile: Dockerfile
    container_name: travel-assistant-admin-web
    ports:
      - "3001:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8080
    depends_on:
      - gateway
    networks:
      - travel-network

  # Prometheus监控
  prometheus:
    image: prom/prometheus:latest
    container_name: travel-assistant-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deployment/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - travel-network

  # Grafana可视化
  grafana:
    image: grafana/grafana:latest
    container_name: travel-assistant-grafana
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deployment/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./deployment/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - travel-network

volumes:
  mysql_data:
  redis_data:
  elasticsearch_data:
  milvus_data:
  etcd_data:
  minio_data:
  prometheus_data:
  grafana_data:

networks:
  travel-network:
    driver: bridge